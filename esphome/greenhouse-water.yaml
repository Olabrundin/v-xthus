esphome:
  name: greenhouse-water
  friendly_name: Greenhouse Water Monitor
  comment: "YF-S201 flow sensor via TXS0108E on ESP32-C6, Thread connected + Wi-Fi fallback"

esp32:
  variant: esp32c6
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf
    version: recommended

# ── Wi-Fi (fallback om Thread inte fungerar) ─────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Anslut även om Thread är aktiv
  priority: 0.5
  # Återanslut vid förlust
  reboot_timeout: 15min
  power_save_mode: LIGHT

  # Manuell IP (valfritt - för stabilare anslutning)
  manual_ip:
    static_ip: 192.168.1.100
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 8.8.8.8
    dns2: 8.8.4.4

  # Ap_mode för felsökning om Wi-Fi misslyckas
  ap:
    ssid: "Greenhouse-Water"
    password: !secret ap_password

# ── Captive Portal (för enkel konfiguration) ─────────────────────────────────
captive_portal:

# ── Thread / OpenThread ────────────────────────────────────────────────────────
thread:
  device_type: end_device
  # Använd Thread för att ansluta till Home Assistant
  # Interface kommer från ESP-IDF

# ── Home Assistant API (encrypted) ────────────────────────────────────────────
api:
  encryption:
    key: !secret api_encryption_key
  # Återanslut om anslutningen bryts
  reboot_timeout: 15min

# ── OTA Updates ───────────────────────────────────────────────────────────────
ota:
  - platform: esphome
    password: !secret ota_password

# ── Web Server (för lokal felsökning) ────────────────────────────────────────
web_server:
  port: 80
  include_internal: false  # Visa bara externa sensorer

# ── Logging ──────────────────────────────────────────────────────────────────
logger:
  level: INFO
  # Öka till DEBUG för felsökning av pulser
  # level: DEBUG
  # logs:
  #   sensor: DEBUG

# ── Time (för daglig reset och tidsstämplar) ─────────────────────────────────
time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: "Europe/Stockholm"

# ── Globals (persistent total volume across reboots) ─────────────────────────
globals:
  - id: total_liters
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: daily_liters
    type: float
    restore_value: false
    initial_value: "0.0"

  - id: daily_reset_time
    type: int
    restore_value: false
    initial_value: "0"

  - id: flow_duration
    type: float
    restore_value: false
    initial_value: "0.0"

# ── Sensors ───────────────────────────────────────────────────────────────────
sensor:
  # Flow rate in L/min
  - platform: pulse_counter
    id: flow_pulse_counter
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: false   # TXS0108E handles signal level; no pull-up needed
    name: "Water Flow Rate"
    unit_of_measurement: "L/min"
    icon: mdi:water-pump
    accuracy_decimals: 2
    update_interval: 10s
    filters:
      # YF-S201 spec: ~450 pulses/liter
      # pulse_counter returns pulses/min → divide by 450 to get L/min
      - multiply: 0.002222   # = 1/450
    on_value:
      then:
        - lambda: |-
            // Accumulate total: flow (L/min) * interval (10s / 60) = liters added
            float liters_added = x * (10.0 / 60.0);
            id(total_liters) += liters_added;
            id(daily_liters) += liters_added;
            id(total_volume_sensor).publish_state(id(total_liters));
            id(daily_volume_sensor).publish_state(id(daily_liters));

            // Track flow duration for leak detection
            if (x > 0.05) {
              id(flow_duration) += 10.0;  // 10 seconds interval
            } else {
              id(flow_duration) = 0.0;
            }

  # Raw pulses for debugging
  - platform: pulse_counter
    id: flow_raw_pulses
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: false
    name: "Raw Pulses"
    unit_of_measurement: "pulses/min"
    icon: mdi:pulse
    accuracy_decimals: 0
    update_interval: 10s
    internal: true  # Only visible in ESPHome logs, not sent to HA

  # Total accumulated volume (L)
  - platform: template
    id: total_volume_sensor
    name: "Total Water Volume"
    unit_of_measurement: "L"
    icon: mdi:water
    accuracy_decimals: 2
    lambda: |-
      return id(total_liters);
    update_interval: 10s

  # Daily usage – resets at midnight
  - platform: template
    id: daily_volume_sensor
    name: "Daily Water Usage"
    unit_of_measurement: "L"
    icon: mdi:calendar-today
    accuracy_decimals: 2
    lambda: |-
      return id(daily_liters);
    update_interval: 10s

  # Peak flow rate (max today)
  - platform: template
    id: peak_flow_sensor
    name: "Peak Flow Rate Today"
    unit_of_measurement: "L/min"
    icon: mdi:water-pump
    accuracy_decimals: 2
    lambda: |-
      static float peak_flow = 0.0;
      float current_flow = id(flow_pulse_counter).state;
      if (current_flow > peak_flow) {
        peak_flow = current_flow;
      }
      return peak_flow;
    update_interval: 30s

  # Flow duration (for leak detection)
  - platform: template
    id: flow_duration_sensor
    name: "Flow Duration"
    unit_of_measurement: "s"
    icon: mdi:timer
    accuracy_decimals: 0
    lambda: |-
      return id(flow_duration);
    update_interval: 10s
    internal: true

  # Total daily reset counter
  - platform: template
    id: reset_count_sensor
    name: "Daily Reset Count"
    unit_of_measurement: "times"
    icon: mdi:counter
    accuracy_decimals: 0
    lambda: |-
      return id(daily_reset_time);
    update_interval: 60s
    internal: true

  # Wi-Fi signal strength (for debugging)
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s

  # ESP32 internal temperature (for monitoring)
  - platform: internal_temperature
    name: "ESP32 Temperature"
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    accuracy_decimals: 1
    update_interval: 60s

# ── Binary Sensors ────────────────────────────────────────────────────────────
binary_sensor:
  # Flow active indicator
  - platform: template
    name: "Water Flowing"
    icon: mdi:waves
    lambda: |-
      return id(flow_pulse_counter).state > 0.05;

  # Possible leak detection (flow > 30 minutes)
  - platform: template
    name: "Possible Leak"
    icon: mdi:leak
    lambda: |-
      return id(flow_duration) > 1800.0;  // 30 minutes
    on_state:
      - if:
          condition:
            binary_sensor.is_on: possible_leak
          then:
            - logger.log: "⚠️ Possible leak detected! Flow has been running for over 30 minutes."
            - homeassistant.service:
                service: persistent_notification.create
                data:
                  title: "⚠️ Water Leak Alert"
                  message: "Water flow has been detected for over 30 minutes. Check for leaks!"
            # Skicka även en varning till HA

  # Daily reset indicator
  - platform: template
    name: "Daily Reset Done"
    icon: mdi:check-circle
    lambda: |-
      return id(daily_reset_time) > 0;
    internal: true

# ── Buttons ───────────────────────────────────────────────────────────────────
button:
  # Reset total volume counter
  - platform: template
    name: "Reset Total Volume"
    icon: mdi:restart
    on_press:
      then:
        - lambda: |-
            id(total_liters) = 0.0;
            id(total_volume_sensor).publish_state(0.0);
            id(flow_duration) = 0.0;
        - logger.log: "Total volume reset to 0"

  # Reset daily volume (triggered automatically at midnight)
  - platform: template
    name: "Reset Daily Volume"
    icon: mdi:calendar-restart
    internal: true
    on_press:
      then:
        - lambda: |-
            id(daily_liters) = 0.0;
            id(daily_volume_sensor).publish_state(0.0);
            id(daily_reset_time) += 1;
            id(reset_count_sensor).publish_state(id(daily_reset_time));
        - logger.log: "Daily volume reset"

  # Clear peak flow
  - platform: template
    name: "Clear Peak Flow"
    icon: mdi:chart-bell-curve
    on_press:
      then:
        - lambda: |-
            // Reset peak flow by setting a new low value
            id(peak_flow_sensor).publish_state(0.0);
        - logger.log: "Peak flow cleared"

  # Test alert (for testing notifications)
  - platform: template
    name: "Test Alert"
    icon: mdi:bell
    on_press:
      then:
        - homeassistant.service:
            service: persistent_notification.create
            data:
              title: "✅ Test Notification"
              message: "This is a test notification from Greenhouse Water Monitor"

# ── Automations ──────────────────────────────────────────────────────────────
# Reset daily volume at midnight (using HA time)
on_time:
  - seconds: 0
    minutes: 0
    hours: 0
    then:
      - button.press: "Reset Daily Volume"
      - logger.log: "🔄 Daily volume reset at midnight"

# ── Status LED (GPIO8 = built-in on many C6 boards) ──────────────────────────
light:
  - platform: status_led
    name: "Status LED"
    pin: GPIO8
    id: status_led

  - platform: esp32_rmt_led_strip
    name: "RGB Status"
    id: rgb_status
    pin: GPIO8  # Same pin as status_led - choose one
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
    internal: true  # Only visible in ESPHome logs
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Heartbeat"
          colors:
            - state: true
              brightness: 100%
              red: 0%
              green: 100%
              blue: 0%
            - state: false
              brightness: 100%
              red: 0%
              green: 0%
              blue: 100%
          transition_length: 1s
          update_interval: 0.5s

# ── Text Sensor (for status messages) ────────────────────────────────────────
text_sensor:
  - platform: template
    name: "Water Status"
    icon: mdi:information
    lambda: |-
      if (id(flow_pulse_counter).state > 0.05) {
        return std::string("🟢 Flowing");
      } else if (id(flow_duration) > 1800.0) {
        return std::string("🔴 LEAK!");
      } else {
        return std::string("🟡 Idle");
      }
    update_interval: 10s

  - platform: wifi_info
    ip_address:
      name: "ESP IP Address"
      icon: mdi:ip
    ssid:
      name: "ESP Wi-Fi SSID"
      icon: mdi:wifi
    bssid:
      name: "ESP Wi-Fi BSSID"
      icon: mdi:access-point
    mac_address:
      name: "ESP MAC Address"
      icon: mdi:ethernet

# ── Additional debug sensors ─────────────────────────────────────────────────
sensor:
  # Uptime sensor
  - platform: uptime
    name: "ESP Uptime"
    unit_of_measurement: "minutes"
    icon: mdi:clock-start
    update_interval: 60s

  # Free memory (for debugging crashes)
  - platform: template
    id: free_memory_sensor
    name: "Free Memory"
    unit_of_measurement: "KB"
    icon: mdi:memory
    accuracy_decimals: 0
    lambda: |-
      return id(esp_free_heap).value / 1024.0;
    update_interval: 60s

  - platform: esp32_ble
    name: "BLE Status"
    id: ble_status
    update_interval: 60s
    internal: true

# ── Gör intern status tillgänglig via API ────────────────────────────────────
api:
  services:
    - service: reset_daily_volume
      then:
        - button.press: "Reset Daily Volume"

    - service: reset_total_volume
      then:
        - button.press: "Reset Total Volume"

    - service: clear_peak_flow
      then:
        - button.press: "Clear Peak Flow"

    - service: test_alert
      then:
        - button.press: "Test Alert"

# ── Automatiskt meddelande vid uppstart ──────────────────────────────────────
on_boot:
  then:
    - logger.log: "🌱 Greenhouse Water Monitor started!"
    - lambda: |-
        ESP_LOGI("main", "Total water usage: %.2f L", id(total_liters));
    - if:
        condition:
          wifi.connected:
        then:
          - logger.log: "✅ Wi-Fi connected"
        else:
          - logger.log: "❌ Wi-Fi not connected"

    # Sätt status-LED vid start
    - light.turn_on:
        id: status_led
        brightness: 50%
        red: 100%
        green: 0%
        blue: 0%

    # Efter 5 sekunder, visa grönt om allt är bra
    - delay: 5s
    - light.turn_on:
        id: status_led
        brightness: 50%
        red: 0%
        green: 100%
        blue: 0%

# ── Interval för att uppdatera status-LED ─────────────────────────────────────
interval:
  - interval: 5s
    then:
      - lambda: |-
          // Blinka LED om flöde aktivt
          if (id(flow_pulse_counter).state > 0.05) {
            // Flöde - blinka grönt
            if (int(esphome::millis() / 500) % 2 == 0) {
              id(status_led).turn_on().perform();
            } else {
              id(status_led).turn_off().perform();
            }
          } else if (id(flow_duration) > 1800.0) {
            // Läckage - blinka rött snabbt
            if (int(esphome::millis() / 200) % 2 == 0) {
              id(status_led).turn_on().perform();
              id(status_led).set_rgb(1.0, 0.0, 0.0).perform();  // Röd
            } else {
              id(status_led).turn_off().perform();
            }
          } else {
            // Idle - fast grönt
            id(status_led).turn_on().perform();
            id(status_led).set_rgb(0.0, 1.0, 0.0).perform();  // Grön
          }

# ── Felsökning: Pulstest vid start ──────────────────────────────────────────
on_boot:
  then:
    - delay: 10s
    - lambda: |-
        // Logga pulser efter 10 sekunder för att verifiera sensor
        int pulse_count = id(flow_pulse_counter).state;
        ESP_LOGI("sensor", "Current pulse rate: %d pulses/min", pulse_count);
